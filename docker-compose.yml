version: "3.9"

services:

  backend:

    build: ./backend

    container_name: groweasy-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    restart: always

  frontend:

    build: ./frontend

    container_name: groweasy-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: always